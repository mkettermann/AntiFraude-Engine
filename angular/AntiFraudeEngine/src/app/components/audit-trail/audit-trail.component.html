<div class="flow-root">
	<ul role="list" class="-mb-8">
		@for (entry of entries(); track entry.occurredAt; let last = $last) {
		<li>
			<div class="relative pb-8">
				@if (!last) {
				<span class="absolute left-4 top-4 -ml-px h-full w-0.5 bg-gray-200" aria-hidden="true"></span>
				}
				<div class="relative flex space-x-3">
					<div>
						<span class="flex h-8 w-8 items-center justify-center rounded-full bg-indigo-50 ring-4 ring-white">
							<svg class="h-4 w-4 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
								stroke="currentColor">
								<path stroke-linecap="round" stroke-linejoin="round"
									d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
							</svg>
						</span>
					</div>
					<div class="flex min-w-0 flex-1 justify-between space-x-4 pt-1.5">
						<div>
							<p class="text-sm text-gray-700">
								<span class="font-semibold text-gray-900">{{ entry.fromStatus }}</span>
								<span class="mx-2 text-gray-400">→</span>
								<span class="font-semibold text-gray-900">{{ entry.toStatus }}</span>
							</p>
							<p class="text-xs text-gray-500 mt-0.5">{{ entry.message }}</p>
						</div>
						<div class="whitespace-nowrap text-right text-xs text-gray-400">
							{{ entry.occurredAt | date: 'dd/MM/yyyy HH:mm:ss' }}
						</div>
					</div>
				</div>
			</div>
		</li>
		}
	</ul>
</div>
